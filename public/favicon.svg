<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Background Squircle with Dark Metallic Gradient -->
  <rect width="64" height="64" rx="16" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="2"/>
  
  <!-- Subtle Background Glow Orb -->
  <circle cx="32" cy="32" r="20" fill="url(#glow-grad)" opacity="0.3" filter="url(#blur-filter)"/>
  
  <!-- Financial Upward Trend Chart Paths -->
  <path d="M16 44 L28 32 L38 38 L48 20" stroke="url(#chart-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-filter)"/>
  <path d="M16 44 L28 32 L38 38 L48 20" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- AI Neural Network Nodes / Connectors -->
  <!-- Node 1 -->
  <circle cx="16" cy="44" r="3.5" fill="#6366f1" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Node 2 -->
  <circle cx="28" cy="32" r="3.5" fill="#818cf8" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Node 3 -->
  <circle cx="38" cy="38" r="3.5" fill="#a5b4fc" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Node 4 (Top Peak) -->
  <circle cx="48" cy="20" r="4.5" fill="#06b6d4" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="48" cy="20" r="8" stroke="#06b6d4" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- Neural Connection Antennas / Brain Waves -->
  <path d="M48 20 L54 14" stroke="#06b6d4" stroke-width="1" stroke-dasharray="2 2"/>
  <circle cx="54" cy="14" r="1.5" fill="#06b6d4"/>
  
  <path d="M48 20 L54 26" stroke="#06b6d4" stroke-width="1" stroke-dasharray="2 2"/>
  <circle cx="54" cy="26" r="1.5" fill="#06b6d4"/>

  <!-- Gradients & Filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0813"/>
      <stop offset="0.5" stop-color="#0f0c1b"/>
      <stop offset="1" stop-color="#060409"/>
    </linearGradient>
    
    <!-- Border Subtle Glow Gradient -->
    <linearGradient id="border-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#d946ef" stop-opacity="0.6"/>
    </linearGradient>
    
    <!-- Center Glow Orb -->
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Chart Line Gradient -->
    <linearGradient id="chart-grad" x1="16" y1="44" x2="48" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    
    <!-- Gaussian Blur for Background Glow -->
    <filter id="blur-filter" x="-10" y="-10" width="84" height="84" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    
    <!-- Drop Shadow / Glow for Chart Line -->
    <filter id="glow-filter" x="8" y="12" width="48" height="40" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>